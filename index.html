<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>2D 캐릭터 리깅 스튜디오</title>
  <meta name="description" content="브라우저에서 바로 조작하는 2D 캐릭터 리깅 도구">
  <style>
:root {
  font-family: Inter, Pretendard, "Noto Sans KR", "Segoe UI", sans-serif;
  color: #eef1f7;
  background: #111318;
  font-synthesis: none;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    radial-gradient(circle at 18% 8%, rgba(92, 104, 142, 0.25), transparent 34%),
    linear-gradient(145deg, #101217, #171a22 62%, #11131a);
}

button,
input,
select {
  font: inherit;
}

button,
select,
input[type="range"],
input[type="checkbox"],
input[type="color"] {
  cursor: pointer;
}

.app-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 350px;
  width: 100vw;
  height: 100vh;
}

.workspace-panel {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  min-width: 0;
  padding: 28px;
  gap: 18px;
}

.workspace-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
}

.eyebrow {
  margin: 0 0 8px;
  color: #9ea8c5;
  font-size: 11px;
  letter-spacing: 0.18em;
  font-weight: 500;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 8px;
  font-size: clamp(24px, 2.2vw, 36px);
  font-weight: 560;
  letter-spacing: -0.04em;
}

.subtitle {
  margin-bottom: 0;
  color: #aeb5c5;
  font-size: 14px;
  line-height: 1.6;
}

.header-actions {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

button {
  border: 0;
}

.primary-button,
.secondary-button {
  min-height: 42px;
  padding: 0 16px;
  border-radius: 12px;
  transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
}

.primary-button {
  color: #10131a;
  background: #dce5ff;
}

.secondary-button {
  color: #e8ebf4;
  border: 1px solid #343a49;
  background: rgba(28, 31, 41, 0.86);
}

.primary-button:hover,
.secondary-button:hover,
.preset-grid button:hover {
  transform: translateY(-1px);
}

.canvas-wrap {
  position: relative;
  min-height: 0;
  overflow: hidden;
  border: 1px solid rgba(115, 126, 158, 0.23);
  border-radius: 22px;
  background: rgba(10, 12, 17, 0.72);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.26), inset 0 1px rgba(255, 255, 255, 0.03);
  touch-action: none;
}

#rigCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

.loading-state {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: #aeb5c5;
  font-size: 14px;
  background: rgba(14, 16, 22, 0.86);
  transition: opacity 180ms ease;
  pointer-events: none;
}

.loading-state.is-hidden {
  opacity: 0;
}

.workspace-footer {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 22px;
  color: #858da1;
  font-size: 12px;
}

.control-panel {
  overflow-y: auto;
  padding: 24px 22px 28px;
  border-left: 1px solid rgba(115, 126, 158, 0.22);
  background: rgba(19, 21, 28, 0.94);
  box-shadow: -20px 0 70px rgba(0, 0, 0, 0.14);
}

.control-section {
  padding: 20px 0 24px;
  border-bottom: 1px solid #2a2e3a;
}

.control-section:first-child {
  padding-top: 2px;
}

.control-section:last-child {
  border-bottom: 0;
}

.section-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-heading h2 {
  margin: 0;
  color: #e5e9f3;
  font-size: 15px;
  font-weight: 560;
}

.section-heading span {
  color: #697084;
  font-size: 10px;
  letter-spacing: 0.16em;
}

.preset-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.preset-grid button {
  min-height: 38px;
  border: 1px solid #343946;
  border-radius: 10px;
  color: #ccd2df;
  background: #20232c;
  transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
}

.preset-grid button:hover {
  border-color: #596176;
  background: #272b36;
}

.joint-controls {
  display: grid;
  gap: 13px;
}

.joint-control {
  display: grid;
  grid-template-columns: 82px minmax(0, 1fr) 48px;
  align-items: center;
  gap: 10px;
}

.joint-control label,
.field-row,
.color-row {
  color: #bbc2d0;
  font-size: 13px;
}

.joint-control output,
.field-row output {
  color: #8892aa;
  font-size: 12px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

input[type="range"] {
  width: 100%;
  height: 4px;
  margin: 7px 0 14px;
  appearance: none;
  border-radius: 999px;
  background: #343946;
}

input[type="range"]::-webkit-slider-thumb {
  width: 15px;
  height: 15px;
  appearance: none;
  border: 3px solid #191c24;
  border-radius: 50%;
  background: #d4ddf8;
  box-shadow: 0 0 0 1px #8290b6;
}

input[type="range"]::-moz-range-thumb {
  width: 11px;
  height: 11px;
  border: 3px solid #191c24;
  border-radius: 50%;
  background: #d4ddf8;
  box-shadow: 0 0 0 1px #8290b6;
}

.field-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
}

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin: 6px 0 20px;
  color: #c3c9d6;
}

.toggle-title,
.toggle-description {
  display: block;
}

.toggle-title {
  margin-bottom: 3px;
  font-size: 13px;
}

.toggle-description {
  color: #747d90;
  font-size: 11px;
  line-height: 1.45;
}

input[type="checkbox"] {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
  appearance: none;
  border-radius: 999px;
  background: #333846;
  transition: background 140ms ease;
}

input[type="checkbox"]::after {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #a3aabb;
  content: "";
  transition: transform 140ms ease, background 140ms ease;
}

input[type="checkbox"]:checked {
  background: #697ba9;
}

input[type="checkbox"]:checked::after {
  transform: translateX(18px);
  background: #f2f5ff;
}

select {
  width: 100%;
  height: 40px;
  margin-top: 4px;
  padding: 0 11px;
  border: 1px solid #363b49;
  border-radius: 10px;
  color: #d4d9e5;
  background: #20232c;
}

.color-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 13px;
}

.color-row input {
  width: 46px;
  height: 30px;
  padding: 2px;
  border: 1px solid #3a4050;
  border-radius: 7px;
  background: #20232c;
}

.is-hidden {
  display: none;
}

.status-list {
  display: grid;
  gap: 9px;
  margin: 0;
}

.status-list div {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.status-list dt,
.status-list dd {
  margin: 0;
  font-size: 12px;
}

.status-list dt {
  color: #777f92;
}

.status-list dd {
  color: #bdc4d2;
  text-align: right;
}

@media (max-width: 980px) {
  body {
    overflow: auto;
  }

  .app-shell {
    grid-template-columns: 1fr;
    height: auto;
    min-height: 100vh;
  }

  .workspace-panel {
    min-height: 72vh;
    padding: 20px;
  }

  .canvas-wrap {
    min-height: 520px;
  }

  .control-panel {
    border-top: 1px solid rgba(115, 126, 158, 0.22);
    border-left: 0;
  }
}

@media (max-width: 640px) {
  .workspace-header {
    display: grid;
  }

  .header-actions {
    width: 100%;
  }

  .header-actions button {
    flex: 1;
  }

  .workspace-panel {
    padding: 14px;
  }

  .canvas-wrap {
    min-height: 460px;
    border-radius: 16px;
  }

  .workspace-footer {
    display: none;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <section class="workspace-panel" aria-label="리깅 작업 영역">
      <header class="workspace-header">
        <div>
          <p class="eyebrow">2D PUPPET WORKSPACE</p>
          <h1>캐릭터 리깅 스튜디오</h1>
          <p class="subtitle">관절점을 드래그해 머리, 팔, 다리와 몸통을 조작할 수 있습니다.</p>
        </div>
        <div class="header-actions">
          <button id="resetButton" class="secondary-button" type="button">기본 자세</button>
          <button id="exportButton" class="primary-button" type="button">PNG 내보내기</button>
        </div>
      </header>

      <div id="canvasWrap" class="canvas-wrap">
        <canvas id="rigCanvas" aria-label="캐릭터 리깅 캔버스"></canvas>
        <div id="loadingState" class="loading-state">캐릭터 파츠를 불러오는 중입니다.</div>
      </div>

      <footer class="workspace-footer">
        <span>원형 관절점: 회전</span>
        <span>중앙 십자 관절점: 캐릭터 이동</span>
        <span>마우스와 터치 입력 지원</span>
      </footer>
    </section>

    <aside class="control-panel" aria-label="리깅 설정">
      <section class="control-section">
        <div class="section-heading">
          <h2>빠른 자세</h2>
          <span>PRESETS</span>
        </div>
        <div class="preset-grid">
          <button type="button" data-preset="default">기본</button>
          <button type="button" data-preset="attention">차렷</button>
          <button type="button" data-preset="cheer">만세</button>
          <button type="button" data-preset="jump">점프</button>
        </div>
      </section>

      <section class="control-section">
        <div class="section-heading">
          <h2>관절 회전</h2>
          <span>JOINTS</span>
        </div>
        <div id="jointControls" class="joint-controls"></div>
      </section>

      <section class="control-section">
        <div class="section-heading">
          <h2>화면 설정</h2>
          <span>VIEW</span>
        </div>

        <label class="field-row" for="zoomRange">
          <span>캐릭터 크기</span>
          <output id="zoomValue">100%</output>
        </label>
        <input id="zoomRange" type="range" min="55" max="145" value="100">

        <label class="toggle-row" for="skeletonToggle">
          <span>
            <span class="toggle-title">리깅 가이드 표시</span>
            <span class="toggle-description">뼈대와 관절점을 화면에 표시합니다.</span>
          </span>
          <input id="skeletonToggle" type="checkbox" checked>
        </label>

        <label class="field-row" for="backgroundSelect">
          <span>배경</span>
        </label>
        <select id="backgroundSelect">
          <option value="checker">투명 격자</option>
          <option value="transparent">완전 투명</option>
          <option value="light">밝은 회색</option>
          <option value="dark">짙은 회색</option>
          <option value="custom">사용자 색상</option>
        </select>

        <label id="customColorRow" class="color-row is-hidden" for="customColor">
          <span>사용자 배경색</span>
          <input id="customColor" type="color" value="#8b92a1">
        </label>
      </section>

      <section class="control-section status-section">
        <div class="section-heading">
          <h2>이미지 처리 정보</h2>
          <span>ASSET</span>
        </div>
        <dl class="status-list">
          <div><dt>처리 방식</dt><dd>Python GrabCut</dd></div>
          <div><dt>파츠</dt><dd>머리, 몸통, 양팔, 양다리</dd></div>
          <div><dt>내보내기</dt><dd>투명 PNG 지원</dd></div>
        </dl>
      </section>
    </aside>
  </main>

function degreesToRadians(value) {
  return value * Math.PI / 180;
}

function radiansToDegrees(value) {
  return value * 180 / Math.PI;
}

function clamp(value, minimum, maximum) {
  return Math.min(maximum, Math.max(minimum, value));
}

function normalizeDegrees(value) {
  let result = value;
  while (result > 180) result -= 360;
  while (result < -180) result += 360;
  return result;
}

function rotatePoint(point, pivot, angleDegrees) {
  const angle = degreesToRadians(angleDegrees);
  const cosine = Math.cos(angle);
  const sine = Math.sin(angle);
  const dx = point.x - pivot.x;
  const dy = point.y - pivot.y;
  return {
    x: pivot.x + dx * cosine - dy * sine,
    y: pivot.y + dx * sine + dy * cosine,
  };
}

function characterScale() {
  return baseScale * state.zoom;
}

function toWorld(point) {
  const torsoPoint = rotatePoint(point, rig.pivots.pelvis, state.torso);
  const scale = characterScale();
  return {
    x: state.rootX + torsoPoint.x * scale,
    y: state.rootY + torsoPoint.y * scale,
  };
}

function childPoint(point, pivot, childAngle) {
  return toWorld(rotatePoint(point, pivot, childAngle));
}

function screenToCharacterRaw(screenX, screenY) {
  const scale = characterScale();
  return {
    x: (screenX - state.rootX) / scale,
    y: (screenY - state.rootY) / scale,
  };
}

function screenToCharacterBeforeTorso(screenX, screenY) {
  return rotatePoint(
    screenToCharacterRaw(screenX, screenY),
    rig.pivots.pelvis,
    -state.torso,
  );
}

function drawChecker(targetContext, width, height) {
  const tile = 18;
  targetContext.fillStyle = "#cfd2d8";
  targetContext.fillRect(0, 0, width, height);
  targetContext.fillStyle = "#adb1ba";
  for (let y = 0; y < height; y += tile) {
    for (let x = 0; x < width; x += tile) {
      if (((x / tile) + (y / tile)) % 2 === 0) {
        targetContext.fillRect(x, y, tile, tile);
      }
    }
  }
}

function drawBackground(targetContext, width, height, mode, allowTransparent) {
  if (mode === "transparent") {
    if (!allowTransparent) drawChecker(targetContext, width, height);
    return;
  }
  if (mode === "checker") {
    drawChecker(targetContext, width, height);
    return;
  }
  targetContext.fillStyle = mode === "light"
    ? "#e8e9ec"
    : mode === "dark"
      ? "#272a31"
      : state.customBackground;
  targetContext.fillRect(0, 0, width, height);
}

function drawRotatedLayer(targetContext, image, pivot, angle) {
  targetContext.save();
  targetContext.translate(pivot.x, pivot.y);
  targetContext.rotate(degreesToRadians(angle));
  targetContext.translate(-pivot.x, -pivot.y);
  targetContext.drawImage(image, 0, 0);
  targetContext.restore();
}

function drawPuppet(targetContext, rootX, rootY, scale, includeSkeleton) {
  targetContext.save();
  targetContext.translate(rootX, rootY);
  targetContext.scale(scale, scale);
  targetContext.translate(rig.pivots.pelvis.x, rig.pivots.pelvis.y);
  targetContext.rotate(degreesToRadians(state.torso));
  targetContext.translate(-rig.pivots.pelvis.x, -rig.pivots.pelvis.y);

  drawRotatedLayer(targetContext, images.left_leg, rig.pivots.leftHip, state.leftLeg);
  drawRotatedLayer(targetContext, images.right_leg, rig.pivots.rightHip, state.rightLeg);
  drawRotatedLayer(targetContext, images.left_arm, rig.pivots.leftShoulder, state.leftArm);
  drawRotatedLayer(targetContext, images.right_arm, rig.pivots.rightShoulder, state.rightArm);
  targetContext.drawImage(images.torso, 0, 0);
  drawRotatedLayer(targetContext, images.head, rig.pivots.neck, state.head);
  targetContext.restore();

  if (includeSkeleton) drawSkeleton(targetContext);
}

function drawBone(targetContext, start, end) {
  targetContext.beginPath();
  targetContext.moveTo(start.x, start.y);
  targetContext.lineTo(end.x, end.y);
  targetContext.stroke();
}

function drawHandle(targetContext, point, type, active) {
  targetContext.save();
  targetContext.lineWidth = 2;
  targetContext.strokeStyle = active ? "#ffffff" : "rgba(238, 244, 255, 0.92)";
  targetContext.fillStyle = active ? "rgba(83, 107, 165, 0.98)" : "rgba(38, 48, 72, 0.92)";

  if (type === "root") {
    targetContext.beginPath();
    targetContext.arc(point.x, point.y, 12, 0, Math.PI * 2);
    targetContext.fill();
    targetContext.stroke();
    targetContext.beginPath();
    targetContext.moveTo(point.x - 6, point.y);
    targetContext.lineTo(point.x + 6, point.y);
    targetContext.moveTo(point.x, point.y - 6);
    targetContext.lineTo(point.x, point.y + 6);
    targetContext.stroke();
  } else {
    targetContext.beginPath();
    targetContext.arc(point.x, point.y, 9, 0, Math.PI * 2);
    targetContext.fill();
    targetContext.stroke();
    targetContext.beginPath();
    targetContext.arc(point.x, point.y, 3, 0, Math.PI * 2);
    targetContext.fillStyle = "#e9efff";
    targetContext.fill();
  }
  targetContext.restore();
}

function getHandlePoints() {
  return {
    root: toWorld(rig.handles.root),
    torso: toWorld(rig.handles.torso),
    head: childPoint(rig.handles.head, rig.pivots.neck, state.head),
    leftArm: childPoint(rig.handles.leftHand, rig.pivots.leftShoulder, state.leftArm),
    rightArm: childPoint(rig.handles.rightHand, rig.pivots.rightShoulder, state.rightArm),
    leftLeg: childPoint(rig.handles.leftFoot, rig.pivots.leftHip, state.leftLeg),
    rightLeg: childPoint(rig.handles.rightFoot, rig.pivots.rightHip, state.rightLeg),
  };
}

function drawSkeleton(targetContext) {
  const points = getHandlePoints();
  const pivots = {
    neck: toWorld(rig.pivots.neck),
    pelvis: toWorld(rig.pivots.pelvis),
    leftShoulder: toWorld(rig.pivots.leftShoulder),
    rightShoulder: toWorld(rig.pivots.rightShoulder),
    leftHip: toWorld(rig.pivots.leftHip),
    rightHip: toWorld(rig.pivots.rightHip),
  };

  targetContext.save();
  targetContext.lineWidth = 3;
  targetContext.lineCap = "round";
  targetContext.strokeStyle = "rgba(105, 138, 215, 0.82)";
  drawBone(targetContext, pivots.neck, points.head);
  drawBone(targetContext, pivots.leftShoulder, points.leftArm);
  drawBone(targetContext, pivots.rightShoulder, points.rightArm);
  drawBone(targetContext, pivots.leftHip, points.leftLeg);
  drawBone(targetContext, pivots.rightHip, points.rightLeg);
  drawBone(targetContext, pivots.neck, pivots.pelvis);
  drawBone(targetContext, pivots.pelvis, points.torso);
  targetContext.restore();

  for (const key of ["head", "torso", "leftArm", "rightArm", "leftLeg", "rightLeg", "root"]) {
    drawHandle(targetContext, points[key], key === "root" ? "root" : "joint", activeDrag?.key === key);
  }
}

function render() {
  if (!rig) return;
  ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
  ctx.clearRect(0, 0, cssWidth, cssHeight);
  drawBackground(ctx, cssWidth, cssHeight, state.background, false);
  drawPuppet(ctx, state.rootX, state.rootY, characterScale(), state.showSkeleton);
}

function resizeCanvas() {
  const rect = canvasWrap.getBoundingClientRect();
  cssWidth = Math.max(1, rect.width);
  cssHeight = Math.max(1, rect.height);
  pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.round(cssWidth * pixelRatio);
  canvas.height = Math.round(cssHeight * pixelRatio);
  canvas.style.width = `${cssWidth}px`;
  canvas.style.height = `${cssHeight}px`;

  if (rig) {
    const previousScale = baseScale;
    baseScale = Math.min((cssWidth - 100) / rig.width, (cssHeight - 70) / rig.height);
    baseScale = Math.max(0.25, baseScale);

    if (!initializedPosition) {
      state.rootX = (cssWidth - rig.width * characterScale()) / 2;
      state.rootY = (cssHeight - rig.height * characterScale()) / 2;
      initializedPosition = true;
    } else if (previousScale > 0) {
      const centerX = state.rootX + rig.width * previousScale * state.zoom / 2;
      const centerY = state.rootY + rig.height * previousScale * state.zoom / 2;
      state.rootX = centerX - rig.width * characterScale() / 2;
      state.rootY = centerY - rig.height * characterScale() / 2;
    }
  }
  render();
}

function createJointControls() {
  jointControls.innerHTML = "";
  for (const definition of jointDefinitions) {
    const limits = rig.limits[definition.limitKey];
    const row = document.createElement("div");
    row.className = "joint-control";

    const label = document.createElement("label");
    label.htmlFor = `${definition.key}Range`;
    label.textContent = definition.label;

    const input = document.createElement("input");
    input.id = `${definition.key}Range`;
    input.type = "range";
    input.min = String(limits[0]);
    input.max = String(limits[1]);
    input.step = "1";
    input.value = String(state[definition.key]);
    input.dataset.joint = definition.key;

    const output = document.createElement("output");
    output.id = `${definition.key}Value`;
    output.textContent = `${state[definition.key]}°`;

    input.addEventListener("input", () => {
      state[definition.key] = Number(input.value);
      output.textContent = `${input.value}°`;
      render();
    });

    row.append(label, input, output);
    jointControls.append(row);
  }
}

function updateControls() {
  for (const definition of jointDefinitions) {
    const input = document.getElementById(`${definition.key}Range`);
    const output = document.getElementById(`${definition.key}Value`);
    if (!input || !output) continue;
    input.value = String(Math.round(state[definition.key]));
    output.textContent = `${Math.round(state[definition.key])}°`;
  }
  zoomRange.value = String(Math.round(state.zoom * 100));
  zoomValue.textContent = `${Math.round(state.zoom * 100)}%`;
}

function resetPose(resetPosition = false) {
  Object.assign(state, presetValues.default);
  if (resetPosition) {
    state.zoom = 1;
    state.rootX = (cssWidth - rig.width * characterScale()) / 2;
    state.rootY = (cssHeight - rig.height * characterScale()) / 2;
  }
  updateControls();
  render();
}

function applyPreset(name) {
  const preset = presetValues[name];
  if (!preset) return;
  Object.assign(state, preset);
  updateControls();
  render();
}

function pointerPosition(event) {
  const rect = canvas.getBoundingClientRect();
  return { x: event.clientX - rect.left, y: event.clientY - rect.top };
}

function findClosestHandle(position) {
  const handles = getHandlePoints();
  let closest = null;
  let closestDistance = Infinity;
  for (const [key, point] of Object.entries(handles)) {
    const dx = position.x - point.x;
    const dy = position.y - point.y;
    const distance = Math.hypot(dx, dy);
    const radius = key === "root" ? 19 : 17;
    if (distance <= radius && distance < closestDistance) {
      closest = { key, point };
      closestDistance = distance;
    }
  }
  return closest;
}

function pointerDown(event) {
  if (!rig || !state.showSkeleton) return;
  const position = pointerPosition(event);
  const hit = findClosestHandle(position);
  if (!hit) return;

  canvas.setPointerCapture(event.pointerId);
  activeDrag = {
    key: hit.key,
    pointerId: event.pointerId,
    offsetX: position.x - state.rootX,
    offsetY: position.y - state.rootY,
  };
  render();
}

function pointerMove(event) {
  if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
  const position = pointerPosition(event);

  if (activeDrag.key === "root") {
    state.rootX = position.x - activeDrag.offsetX;
    state.rootY = position.y - activeDrag.offsetY;
    render();
    return;
  }

  const localPoint = screenToCharacterBeforeTorso(position.x, position.y);
  const mapping = {
    head: { pivot: rig.pivots.neck, handle: rig.handles.head, stateKey: "head", limitKey: "head" },
    leftArm: { pivot: rig.pivots.leftShoulder, handle: rig.handles.leftHand, stateKey: "leftArm", limitKey: "leftArm" },
    rightArm: { pivot: rig.pivots.rightShoulder, handle: rig.handles.rightHand, stateKey: "rightArm", limitKey: "rightArm" },
    leftLeg: { pivot: rig.pivots.leftHip, handle: rig.handles.leftFoot, stateKey: "leftLeg", limitKey: "leftLeg" },
    rightLeg: { pivot: rig.pivots.rightHip, handle: rig.handles.rightFoot, stateKey: "rightLeg", limitKey: "rightLeg" },
  };

  if (activeDrag.key === "torso") {
    const pivot = rig.pivots.pelvis;
    const rawPoint = screenToCharacterRaw(position.x, position.y);
    const rawAngle = radiansToDegrees(Math.atan2(rawPoint.y - pivot.y, rawPoint.x - pivot.x));
    const limits = rig.limits.torso;
    state.torso = clamp(normalizeDegrees(rawAngle), limits[0], limits[1]);
    updateControls();
    render();
    return;
  }

  const definition = mapping[activeDrag.key];
  if (!definition) return;
  const baseAngle = radiansToDegrees(
    Math.atan2(
      definition.handle.y - definition.pivot.y,
      definition.handle.x - definition.pivot.x,
    ),
  );
  const currentAngle = radiansToDegrees(
    Math.atan2(localPoint.y - definition.pivot.y, localPoint.x - definition.pivot.x),
  );
  const limits = rig.limits[definition.limitKey];
  state[definition.stateKey] = clamp(normalizeDegrees(currentAngle - baseAngle), limits[0], limits[1]);
  updateControls();
  render();
}

function pointerUp(event) {
  if (!activeDrag || activeDrag.pointerId !== event.pointerId) return;
  activeDrag = null;
  render();
}

function exportPng() {
  const exportScale = 3;
  const margin = 42;
  const output = document.createElement("canvas");
  output.width = Math.round((rig.width + margin * 2) * exportScale);
  output.height = Math.round((rig.height + margin * 2) * exportScale);
  const outputContext = output.getContext("2d");
  outputContext.clearRect(0, 0, output.width, output.height);
  drawBackground(outputContext, output.width, output.height, state.background, true);
  drawPuppet(outputContext, margin * exportScale, margin * exportScale, exportScale, false);

  const link = document.createElement("a");
  const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
  link.download = `rigged-character-${timestamp}.png`;
  link.href = output.toDataURL("image/png");
  link.click();
}

async function loadImage(name) {
  const image = new Image();
  image.decoding = "async";
  image.src = ASSET_URLS[name];
  await image.decode();
  images[name] = image;
}

async function initialize() {
  try {
    rig = RIG_DATA;
    await Promise.all(imageNames.map(loadImage));
    createJointControls();
    resizeCanvas();
    loadingState.classList.add("is-hidden");
  } catch (error) {
    loadingState.textContent = `불러오기 실패: ${error.message}`;
    console.error(error);
  }
}

resetButton.addEventListener("click", () => resetPose(true));
exportButton.addEventListener("click", exportPng);

zoomRange.addEventListener("input", () => {
  const oldScale = characterScale();
  const centerX = state.rootX + rig.width * oldScale / 2;
  const centerY = state.rootY + rig.height * oldScale / 2;
  state.zoom = Number(zoomRange.value) / 100;
  const newScale = characterScale();
  state.rootX = centerX - rig.width * newScale / 2;
  state.rootY = centerY - rig.height * newScale / 2;
  zoomValue.textContent = `${zoomRange.value}%`;
  render();
});

skeletonToggle.addEventListener("change", () => {
  state.showSkeleton = skeletonToggle.checked;
  activeDrag = null;
  render();
});

backgroundSelect.addEventListener("change", () => {
  state.background = backgroundSelect.value;
  customColorRow.classList.toggle("is-hidden", state.background !== "custom");
  render();
});

customColor.addEventListener("input", () => {
  state.customBackground = customColor.value;
  render();
});

document.querySelectorAll("[data-preset]").forEach((button) => {
  button.addEventListener("click", () => applyPreset(button.dataset.preset));
});

canvas.addEventListener("pointerdown", pointerDown);
canvas.addEventListener("pointermove", pointerMove);
canvas.addEventListener("pointerup", pointerUp);
canvas.addEventListener("pointercancel", pointerUp);
window.addEventListener("resize", resizeCanvas);

initialize();

</script>
</body>
</html>
